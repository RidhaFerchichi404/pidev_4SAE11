###############################################################################
# Ingress — routes HTTP into the cluster (browser on the kubeadm VM, etc.).
#
# Prerequisites:
#   1. Install ingress-nginx (kubeadm / bare-metal; pin version to match your cluster if needed):
#        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/baremetal/deploy.yaml
#   2. HTTP NodePort (bare-metal Service): kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.spec.ports[?(@.name=="http")].nodePort}{"\n"}'
#   3. On the VM, /etc/hosts — point the Ingress hostnames at your node IP (browser uses Host header on that IP:NodePort):
#        192.168.x.x smartfreelance.example.com api.smartfreelance.example.com auth.smartfreelance.example.com db.smartfreelance.example.com
#      Then open e.g. http://192.168.x.x:<http-nodeport>/ with those hostnames (or use a local reverse proxy on :80).
#
# Replace *.smartfreelance.example.com with your real domain if needed.
# TLS: uncomment spec.tls and use cert-manager or a manual secret.
###############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-freelance-ingress
  namespace: smart-freelance
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Uncomment when using cert-manager for TLS:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts: [smartfreelance.example.com]
  #     secretName: smartfreelance-tls
  rules:
    # Frontend — serves Angular SPA
    - host: smartfreelance.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: {number: 80}

    # API — all backend traffic goes through the gateway
    - host: api.smartfreelance.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port: {number: 8078}

    # Keycloak — browser auth flows (login, registration)
    - host: auth.smartfreelance.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port: {number: 8080}

    # phpMyAdmin — MySQL UI (dev/lab only; see 11-phpmyadmin.yaml)
    - host: db.smartfreelance.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phpmyadmin
                port: {number: 80}
