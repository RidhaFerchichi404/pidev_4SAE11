apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: smart-freelance
data:
  # Eureka
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka:8420/eureka"

  # Spring profiles — activates application-docker.yml routes in gateway
  SPRING_PROFILES_ACTIVE: "docker"

  # Keycloak: server URL is in-cluster; JWT issuer/JWKS use the same so microservices can validate without extra DNS.
  # If browser logins issue tokens with a different iss (e.g. http://auth.smartfreelance.example.com), align these URLs
  # and ensure pods resolve that host (CoreDNS hosts map to the keycloak Service ClusterIP) or use a single hostname strategy.
  KEYCLOAK_SERVER_URL: "http://keycloak:8080"
  KEYCLOAK_AUTH_SERVER_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "smart-freelance"
  KEYCLOAK_CLIENT_ID: "smart-freelance-backend"
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: "http://keycloak:8080/realms/smart-freelance"
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:8080/realms/smart-freelance/protocol/openid-connect/certs"
  KEYCLOAK_ISSUER_URI: "http://keycloak:8080/realms/smart-freelance"
  KEYCLOAK_JWKS_URI: "http://keycloak:8080/realms/smart-freelance/protocol/openid-connect/certs"

  # Config Server
  SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"

  # JPA — auto-create/update schema on first deploy
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"

  # Internal service URLs (used by review, user, etc.)
  NOTIFICATION_SERVICE_URL: "http://notification:8087"
  USER_SERVICE_URL: "http://user:8090"
  KEYCLOAK_AUTH_SERVICE_URL: "http://keycloak-auth:8079"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_MODEL: "gemma2:2b"
  NOTIFICATION_FIREBASE_ENABLED: "true"
  GOOGLE_CALENDAR_ENABLED: "true"
