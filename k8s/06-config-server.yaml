apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: smart-freelance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: YOUR_DOCKERHUB_USERNAME/config-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SERVER_PORT
              value: "8888"
            # Config Server must not bootstrap from another config server.
            # app-config sets SPRING_CONFIG_IMPORT for client services; override it here.
            - name: SPRING_CONFIG_IMPORT
              value: ""
            # Force native backend (classpath:/config) for this deployment.
            - name: SPRING_PROFILES_ACTIVE
              value: "native"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: smart-freelance
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "9090"
spec:
  selector:
    app: config-server
  ports:
    - name: http
      port: 8888
      targetPort: 8888
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
