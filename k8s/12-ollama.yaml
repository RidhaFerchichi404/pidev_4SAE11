apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: smart-freelance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 40
            periodSeconds: 20
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data-pvc
  namespace: smart-freelance
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: smart-freelance
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-init
  namespace: smart-freelance
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pull-model
          image: curlimages/curl:8.11.1
          envFrom:
            - configMapRef:
                name: app-config
          command:
            - /bin/sh
            - -ec
            - |
              until curl -fsS http://ollama:11434/api/tags >/dev/null; do
                echo "Waiting for ollama..."
                sleep 3
              done
              echo "Pulling model ${OLLAMA_MODEL:-gemma2:2b}"
              curl -fsS http://ollama:11434/api/pull -H "Content-Type: application/json" -d "{\"name\":\"${OLLAMA_MODEL:-gemma2:2b}\"}"
