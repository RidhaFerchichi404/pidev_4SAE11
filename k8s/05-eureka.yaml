apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: smart-freelance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
        - name: eureka
          image: YOUR_DOCKERHUB_USERNAME/eureka:latest   # replace with your image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8420
            - containerPort: 9090
          env:
            - name: SERVER_PORT
              value: "8420"
            - name: MANAGEMENT_SERVER_PORT
              value: "9090"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus,metrics,env,loggers,refresh"
            - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
              value: "always"
            - name: MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED
              value: "true"
            - name: MANAGEMENT_METRICS_TAGS_PLATFORM
              value: "smart-freelance"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8420
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8420
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: smart-freelance
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "9090"
spec:
  selector:
    app: eureka
  ports:
    - name: http
      port: 8420
      targetPort: 8420
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
