spring.application.name=keycloak-auth
server.port=8079

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8420/eureka}
eureka.client.register-with-eureka=true

# Keycloak server (run Keycloak separately - see README; must be Keycloak's URL, not this service's port)
# Use env overrides in CI/K8s to avoid hardcoded secrets.
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:${KEYCLOAK_SERVER_URL:http://localhost:8080}}
keycloak.realm=${KEYCLOAK_REALM:smart-freelance}
keycloak.resource=${KEYCLOAK_CLIENT_ID:smart-freelance-backend}
keycloak.credentials.secret=${KEYCLOAK_CLIENT_SECRET:}

# Keycloak Admin API (for user registration). If admin-cli has "Client authentication" ON, set client-secret.
keycloak.admin.realm=${KEYCLOAK_ADMIN_REALM:master}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# Service-to-service secret (same value must be set in User microservice for sync delete/update)
keycloak.service-secret=${KEYCLOAK_SERVICE_SECRET:smart-freelance-internal-secret}

# OAuth2 Resource Server: validate JWT from Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

# Actuator (health for Eureka)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
