spring.application.name=Project
server.port=8084

welcome.message=Welcome to Project microservice (from Config Server)

# JWT (Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/smart-freelance}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/smart-freelance/protocol/openid-connect/certs}

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8420/eureka/

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/projectdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator refresh endpoint exposure
management.endpoints.web.exposure.include=refresh,health,info,prometheus

# ML project success / failure risk (Python inference service)
ml.inference.base-url=http://localhost:8102
ml.risk.enabled=true
ml.risk.use-task-aggregates=true
ml.risk.use-review-aggregates=true
project.integration.task-url=http://localhost:8091
project.integration.review-url=http://localhost:8085