spring.application.name=notification
server.port=${SERVER_PORT:8098}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8420/eureka}
eureka.client.register-with-eureka=true

welcome.message=Welcome to notification microservice (local config)

# JWT (Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/smart-freelance}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/smart-freelance/protocol/openid-connect/certs}

# Firebase: Firestore when true + credentials (env GOOGLE_APPLICATION_CREDENTIALS, path below, or auto-pick under firebase-credentials/).
# JSON files under firebase-credentials/ are gitignored. Set notification.firebase.enabled=false to use in-memory only.
notification.firebase.enabled=true
notification.firebase.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:}

# Swagger / OpenAPI
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration,org.springdoc.core.configuration.SpringDocHateoasConfiguration,org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Config Server client
spring.cloud.config.enabled=true
spring.config.import=${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}

# ── Monitoring / Prometheus ──────────────────────────────────────────────────
# In Docker: management.server.port is set to 9090 via MANAGEMENT_SERVER_PORT env var
# (see docker-compose.yml x-java-env) — metrics are served on port 9090, separate
# from the main port, bypassing Spring Security entirely.
# Locally: metrics served on the main service port.
management.endpoints.web.exposure.include=health,info,prometheus,metrics,env,loggers,refresh
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true
